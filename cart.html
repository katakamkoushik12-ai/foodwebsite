<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TastyFoods | Your Cart</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

/* BODY */
body{
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px 50px;
  background: linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
}

nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}

nav a{
  color:white;
  text-decoration:none;
}

/* CART */
.cart-page{
  padding:40px;
  text-align:center;
}

.cart-container{
  max-width:800px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* ITEM */
.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:15px 0;
  padding:10px;
  border-bottom:1px solid #ddd;
}

.item-info{
  text-align:left;
}

.item-name{
  font-weight:bold;
}

/* BUTTONS */
.qty-btn{
  padding:5px 10px;
  border:none;
  background:#ff512f;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

.remove-btn{
  background:red;
  color:white;
  border:none;
  padding:5px 10px;
  cursor:pointer;
  border-radius:5px;
}

.addon-select{
  margin-top:5px;
}

/* ACTION BUTTONS */
.order-btn{
  margin:10px;
  padding:12px 25px;
  border:none;
  background: linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
  border-radius:25px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

.order-btn:hover{
  transform:scale(1.1);
}

/* PLACE ORDER BUTTON */
.place-order{
  background: linear-gradient(90deg,#28a745,#218838);
}

/* PAYMENT SECTION */
.payment-section{
  max-width:800px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  text-align:left;
}

.payment-section h2{
  margin-bottom:10px;
}

.payment-section label{
  display:block;
  margin:10px 0;
  font-size:16px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background: linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
  margin-top:30px;
}
.recommend-section{
  max-width:900px;
  margin:30px auto;
  text-align:center;
}

.recommend-container{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.recommend-card{
  background:white;
  padding:15px;
  width:180px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.recommend-card:hover{
  transform:translateY(-8px);
}

.recommend-card button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  background:#ff512f;
  color:white;
  border-radius:20px;
  cursor:pointer;
}
/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 50px;
  background: linear-gradient(90deg,#ff512f,#dd2476);
  color:white;
  position:relative;
}

/* NAV */
nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:500;
}

/* HAMBURGER */
.menu-toggle{
  display:none;
  font-size:28px;
  cursor:pointer;
}

/* MOBILE VIEW */
@media(max-width:768px){

  .menu-toggle{
    display:block;
  }

  nav{
    position:absolute;
    top:60px;
    right:0;
    width:100%;
    background:#ff512f;
    display:none;
    text-align:center;
  }

  nav ul{
    flex-direction:column;
    padding:20px 0;
  }

  nav ul li{
    margin:10px 0;
  }

  nav.active{
    display:block;
  }
}

</style>
</head>

<body>

<header>
  <div class="logo">TastyFoods</div>

  <!-- HAMBURGER -->
  <div class="menu-toggle" onclick="toggleMenu()">
    ☰
  </div>

  <nav id="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li class="cart-icon">
        <a href="cart.html">🛒</a>
        <span class="cart-count" id="cart-count">0</span>
      </li><li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="cart-page">
<h1>Your Shopping Cart</h1>

<div class="cart-container" id="cart-container"></div>

<h2>Total: $<span id="cart-total">0</span></h2>

<!-- PAYMENT OPTIONS -->
<div class="payment-section">
<h2>Select Payment Method</h2>

<label>
<input type="radio" name="payment" value="COD" checked>
Cash on Delivery
</label>

<label>
<input type="radio" name="payment" value="UPI">
UPI (Google Pay / PhonePe)
</label>

<label>
<input type="radio" name="payment" value="CARD">
Credit / Debit Card
</label>

</div>

<!-- RECOMMENDATIONS -->
<div class="recommend-section">

<h2>🔥 Most People Also Order</h2>

<div class="recommend-container">

<div class="recommend-card">
<h3>Burger</h3>
<p>$8</p>
<button onclick="addRecommended('Burger',8)">Add</button>
</div>

<div class="recommend-card">
<h3>Pizza</h3>
<p>$12</p>
<button onclick="addRecommended('Pizza',12)">Add</button>
</div>

<div class="recommend-card">
<h3>Cold Drink</h3>
<p>$3</p>
<button onclick="addRecommended('Cold Drink',3)">Add</button>
</div>

<div class="recommend-card">
<h3>French Fries</h3>
<p>$5</p>
<button onclick="addRecommended('French Fries',5)">Add</button>
</div>

</div>
</div>

<!-- BUTTONS -->
<div>
<button onclick="clearCart()" class="order-btn">Clear Cart</button>
<a href="menu.html"><button class="order-btn">Continue Shopping</button></a>
<button onclick="placeOrder()" class="order-btn place-order">Place Order</button>
</div>

</section>

<footer>
<p>© 2026 TastyFoods | Fresh Food Delivered</p>
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
  const container = document.getElementById("cart-container");
  const totalElement = document.getElementById("cart-total");

  container.innerHTML = "";
  let total = 0;

  if(cart.length === 0){
    container.innerHTML = "<p>Your cart is empty</p>";
    totalElement.textContent = "0";
    return;
  }

  cart.forEach((item, index)=>{

    const div = document.createElement("div");
    div.classList.add("cart-item");

    let addonCost = 0;
    if(item.addons.includes("Cheese")) addonCost += 2;
    if(item.addons.includes("Drink")) addonCost += 3;

    let itemTotal = (item.price + addonCost) * item.quantity;
    total += itemTotal;

    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div>$${item.price}</div>

        <select class="addon-select" onchange="addAddon(${index}, this.value)">
          <option value="">Add-ons</option>
          <option value="Cheese">Extra Cheese (+$2)</option>
          <option value="Drink">Drink (+$3)</option>
        </select>
      </div>

      <div>
        <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
        ${item.quantity}
        <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
      </div>

      <button class="remove-btn" onclick="removeItem(${index})">X</button>
    `;

    container.appendChild(div);
  });

  totalElement.textContent = total.toFixed(2);
  localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQty(index, change){
  cart[index].quantity += change;

  if(cart[index].quantity <= 0){
    cart.splice(index,1);
  }

  renderCart();
}

function removeItem(index){
  cart.splice(index,1);
  renderCart();
}

function addAddon(index, addon){
  if(addon && !cart[index].addons.includes(addon)){
    cart[index].addons.push(addon);
  }
  renderCart();
}

function clearCart(){
  cart = [];
  localStorage.removeItem("cart");
  renderCart();
}

/* UPDATED PLACE ORDER */
function placeOrder(){

  if(cart.length === 0){
    alert("Your cart is empty!");
    return;
  }

  const payment = document.querySelector('input[name="payment"]:checked').value;

  if(payment === "COD"){
    alert("🎉 Order Placed (Cash on Delivery)");
  }
  else if(payment === "UPI"){
    alert("📱 UPI Payment Selected (Demo)");
  }
  else{
    alert("💳 Card Payment Selected (Demo)");
  }

  cart = [];
  localStorage.removeItem("cart");
  renderCart();
}

renderCart();
function addRecommended(name, price){

  let existingItem = cart.find(item => item.name === name);

  if(existingItem){
    existingItem.quantity += 1;
  } else {
    cart.push({
      name:name,
      price:price,
      quantity:1,
      addons:[]
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();

  alert(name + " added to cart!");
}

function toggleMenu(){
  document.getElementById("navbar").classList.toggle("active");
}
</script>


</body>
</html>
